<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 400" font-family="system-ui, sans-serif">
  <rect width="550" height="400" rx="8" fill="#0a0e17"/>
  <text x="275" y="25" text-anchor="middle" fill="#4fc3f7" font-size="14" font-weight="bold">IBC Tote Biofloc Setup (Top View)</text>

  <!-- IBC tote outline (top view) -->
  <rect x="125" y="50" width="300" height="250" rx="8" fill="#1a2332" stroke="#4fc3f7" stroke-width="2"/>
  <text x="275" y="72" text-anchor="middle" fill="#4fc3f7" font-size="10">275 gal IBC Tote (48"x40"x46")</text>

  <!-- Water fill -->
  <rect x="135" y="80" width="280" height="210" rx="4" fill="#1a3040" opacity="0.4"/>

  <!-- Air stones (4 positions) -->
  <ellipse cx="195" cy="260" rx="18" ry="8" fill="#5c6bc0" opacity="0.6"/>
  <text x="195" y="263" text-anchor="middle" fill="#fff" font-size="6">AIR</text>

  <ellipse cx="355" cy="260" rx="18" ry="8" fill="#5c6bc0" opacity="0.6"/>
  <text x="355" y="263" text-anchor="middle" fill="#fff" font-size="6">AIR</text>

  <ellipse cx="195" cy="130" rx="18" ry="8" fill="#5c6bc0" opacity="0.6"/>
  <text x="195" y="133" text-anchor="middle" fill="#fff" font-size="6">AIR</text>

  <ellipse cx="355" cy="130" rx="18" ry="8" fill="#5c6bc0" opacity="0.6"/>
  <text x="355" y="133" text-anchor="middle" fill="#fff" font-size="6">AIR</text>

  <!-- Heater -->
  <rect x="265" y="95" width="60" height="12" rx="3" fill="#e57373" opacity="0.7"/>
  <text x="295" y="104" text-anchor="middle" fill="#fff" font-size="6">HEATER</text>

  <!-- Second heater -->
  <rect x="225" y="240" width="60" height="12" rx="3" fill="#e57373" opacity="0.7"/>
  <text x="255" y="249" text-anchor="middle" fill="#fff" font-size="6">HEATER</text>

  <!-- Feed tray -->
  <rect x="250" y="170" width="50" height="40" rx="3" fill="none" stroke="#66bb6a" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="275" y="192" text-anchor="middle" fill="#66bb6a" font-size="7">FEED</text>
  <text x="275" y="202" text-anchor="middle" fill="#66bb6a" font-size="7">TRAY</text>

  <!-- Thermometer -->
  <circle cx="160" cy="190" r="6" fill="none" stroke="#ffa726" stroke-width="1.5"/>
  <text x="160" y="193" text-anchor="middle" fill="#ffa726" font-size="6">T</text>

  <!-- Shrimp symbols -->
  <text x="220" y="160" fill="#ff8a80" font-size="10">~</text>
  <text x="300" y="145" fill="#ff8a80" font-size="10">~</text>
  <text x="260" y="220" fill="#ff8a80" font-size="10">~</text>
  <text x="340" y="200" fill="#ff8a80" font-size="10">~</text>
  <text x="180" y="225" fill="#ff8a80" font-size="10">~</text>

  <!-- Air tubing from side -->
  <line x1="125" y1="195" x2="60" y2="195" stroke="#546e7a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="10" y="180" width="50" height="30" rx="4" fill="#263238" stroke="#546e7a" stroke-width="1"/>
  <text x="35" y="197" text-anchor="middle" fill="#b0bec5" font-size="7">AIR</text>
  <text x="35" y="207" text-anchor="middle" fill="#b0bec5" font-size="7">PUMP</text>

  <!-- Cover/shade -->
  <line x1="125" y1="50" x2="425" y2="50" stroke="#795548" stroke-width="3" stroke-dasharray="6,4"/>
  <text x="475" y="55" fill="#8d6e63" font-size="8">shade cover</text>

  <!-- Labels -->
  <rect x="30" y="315" width="490" height="75" rx="6" fill="#111822" stroke="#1e3050" stroke-width="1"/>
  <text x="275" y="335" text-anchor="middle" fill="#4fc3f7" font-size="10" font-weight="bold">Setup Checklist</text>
  <text x="40" y="352" fill="#81d4fa" font-size="8">4x air stones (bottom corners)</text>
  <text x="40" y="366" fill="#81d4fa" font-size="8">2x heaters (opposite sides, redundancy)</text>
  <text x="40" y="380" fill="#81d4fa" font-size="8">1x feed tray (center-ish)</text>
  <text x="275" y="352" fill="#81d4fa" font-size="8">1x thermometer probe</text>
  <text x="275" y="366" fill="#81d4fa" font-size="8">Dark exterior paint (reduce algae/stress)</text>
  <text x="275" y="380" fill="#81d4fa" font-size="8">Shade cover (reduces evaporation, algae)</text>
</svg>
