<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4fc3f7"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ef5350"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#66bb6a"/>
    </marker>
  </defs>
  <rect width="500" height="320" rx="8" fill="#0a0e17"/>
  <text x="250" y="28" text-anchor="middle" fill="#4fc3f7" font-size="15" font-weight="bold">The Nitrogen Cycle</text>

  <!-- Waste -->
  <rect x="170" y="50" width="160" height="40" rx="8" fill="#1a2332" stroke="#8d6e63" stroke-width="2"/>
  <text x="250" y="72" text-anchor="middle" fill="#bcaaa4" font-size="11">Shrimp Waste + Uneaten Feed</text>

  <!-- Arrow down -->
  <line x1="250" y1="90" x2="250" y2="115" stroke="#ef5350" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- Ammonia -->
  <rect x="170" y="115" width="160" height="45" rx="8" fill="#2a1515" stroke="#ef5350" stroke-width="2"/>
  <text x="250" y="137" text-anchor="middle" fill="#ef5350" font-size="12" font-weight="bold">AMMONIA (NH3)</text>
  <text x="250" y="152" text-anchor="middle" fill="#ef9a9a" font-size="9">TOXIC - lethal > 1 mg/L</text>

  <!-- Arrow down with bacteria name -->
  <line x1="250" y1="160" x2="250" y2="190" stroke="#ffa726" stroke-width="2" marker-end="url(#arr)"/>
  <text x="345" y="180" fill="#ffcc80" font-size="8" font-style="italic">Nitrosomonas bacteria</text>

  <!-- Nitrite -->
  <rect x="170" y="190" width="160" height="45" rx="8" fill="#2a2015" stroke="#ffa726" stroke-width="2"/>
  <text x="250" y="212" text-anchor="middle" fill="#ffa726" font-size="12" font-weight="bold">NITRITE (NO2)</text>
  <text x="250" y="227" text-anchor="middle" fill="#ffcc80" font-size="9">TOXIC - lethal > 5 mg/L</text>

  <!-- Arrow down -->
  <line x1="250" y1="235" x2="250" y2="265" stroke="#66bb6a" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="345" y="255" fill="#a5d6a7" font-size="8" font-style="italic">Nitrobacter bacteria</text>

  <!-- Nitrate -->
  <rect x="170" y="265" width="160" height="45" rx="8" fill="#152a18" stroke="#66bb6a" stroke-width="2"/>
  <text x="250" y="287" text-anchor="middle" fill="#66bb6a" font-size="12" font-weight="bold">NITRATE (NO3)</text>
  <text x="250" y="302" text-anchor="middle" fill="#a5d6a7" font-size="9">Low toxicity - removed by water changes</text>

  <!-- Biofloc shortcut -->
  <rect x="10" y="120" width="130" height="65" rx="6" fill="#1a2332" stroke="#4fc3f7" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="75" y="140" text-anchor="middle" fill="#4fc3f7" font-size="9" font-weight="bold">BIOFLOC SHORTCUT</text>
  <text x="75" y="155" text-anchor="middle" fill="#81d4fa" font-size="8">Heterotrophic bacteria</text>
  <text x="75" y="168" text-anchor="middle" fill="#81d4fa" font-size="8">+ carbon source =</text>
  <text x="75" y="180" text-anchor="middle" fill="#4fc3f7" font-size="8">directly eat ammonia</text>

  <line x1="140" y1="152" x2="170" y2="137" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3"/>

  <!-- Plants shortcut -->
  <rect x="370" y="270" width="115" height="40" rx="6" fill="#1a2332" stroke="#66bb6a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="427" y="288" text-anchor="middle" fill="#a5d6a7" font-size="9">Plants absorb</text>
  <text x="427" y="301" text-anchor="middle" fill="#a5d6a7" font-size="9">nitrate (aquaponics)</text>
  <line x1="370" y1="290" x2="330" y2="290" stroke="#66bb6a" stroke-width="1.5" marker-end="url(#arr-green)" stroke-dasharray="4,3"/>
</svg>
