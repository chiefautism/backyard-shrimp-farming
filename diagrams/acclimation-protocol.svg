<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="system-ui, sans-serif">
  <defs>
    <marker id="ap" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#4fc3f7"/>
    </marker>
  </defs>
  <rect width="600" height="320" rx="8" fill="#0a0e17"/>
  <text x="300" y="25" text-anchor="middle" fill="#4fc3f7" font-size="14" font-weight="bold">Post-Larvae Acclimation Protocol</text>
  <text x="300" y="42" text-anchor="middle" fill="#ef5350" font-size="9">RUSHING THIS = MASS DIE-OFF. Take your time.</text>

  <!-- Step 1 -->
  <rect x="20" y="60" width="115" height="80" rx="8" fill="#1a2332" stroke="#42a5f5" stroke-width="2"/>
  <text x="77" y="78" text-anchor="middle" fill="#42a5f5" font-size="10" font-weight="bold">STEP 1</text>
  <text x="77" y="93" text-anchor="middle" fill="#90caf9" font-size="8">Float Bag</text>
  <text x="77" y="108" text-anchor="middle" fill="#546e7a" font-size="7">15-20 minutes</text>
  <text x="77" y="120" text-anchor="middle" fill="#546e7a" font-size="7">Temperature</text>
  <text x="77" y="130" text-anchor="middle" fill="#546e7a" font-size="7">equalization</text>

  <line x1="135" y1="100" x2="155" y2="100" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#ap)"/>

  <!-- Step 2 -->
  <rect x="155" y="60" width="115" height="80" rx="8" fill="#1a2332" stroke="#66bb6a" stroke-width="2"/>
  <text x="212" y="78" text-anchor="middle" fill="#66bb6a" font-size="10" font-weight="bold">STEP 2</text>
  <text x="212" y="93" text-anchor="middle" fill="#a5d6a7" font-size="8">Drip Acclimate</text>
  <text x="212" y="108" text-anchor="middle" fill="#546e7a" font-size="7">Add 1 cup tank</text>
  <text x="212" y="120" text-anchor="middle" fill="#546e7a" font-size="7">water every 10 min</text>
  <text x="212" y="130" text-anchor="middle" fill="#546e7a" font-size="7">for 1-2 hours</text>

  <line x1="270" y1="100" x2="290" y2="100" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#ap)"/>

  <!-- Step 3 -->
  <rect x="290" y="60" width="115" height="80" rx="8" fill="#1a2332" stroke="#ffa726" stroke-width="2"/>
  <text x="347" y="78" text-anchor="middle" fill="#ffa726" font-size="10" font-weight="bold">STEP 3</text>
  <text x="347" y="93" text-anchor="middle" fill="#ffcc80" font-size="8">Test & Verify</text>
  <text x="347" y="108" text-anchor="middle" fill="#546e7a" font-size="7">Salinity: <2 ppt diff</text>
  <text x="347" y="120" text-anchor="middle" fill="#546e7a" font-size="7">pH: <0.5 diff</text>
  <text x="347" y="130" text-anchor="middle" fill="#546e7a" font-size="7">Temp: <1°C diff</text>

  <line x1="405" y1="100" x2="425" y2="100" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#ap)"/>

  <!-- Step 4 -->
  <rect x="425" y="60" width="155" height="80" rx="8" fill="#1a2332" stroke="#ce93d8" stroke-width="2"/>
  <text x="502" y="78" text-anchor="middle" fill="#ce93d8" font-size="10" font-weight="bold">STEP 4</text>
  <text x="502" y="93" text-anchor="middle" fill="#e1bee7" font-size="8">Release & Rest</text>
  <text x="502" y="108" text-anchor="middle" fill="#546e7a" font-size="7">Gently pour into tank</text>
  <text x="502" y="120" text-anchor="middle" fill="#546e7a" font-size="7">Dim lights 24 hours</text>
  <text x="502" y="130" text-anchor="middle" fill="#546e7a" font-size="7">No feeding 12-24 hrs</text>

  <!-- Max rates box -->
  <rect x="50" y="165" width="500" height="55" rx="8" fill="#2a1515" stroke="#ef5350" stroke-width="1.5"/>
  <text x="300" y="185" text-anchor="middle" fill="#ef5350" font-size="11" font-weight="bold">MAXIMUM SAFE RATES OF CHANGE</text>
  <text x="300" y="205" text-anchor="middle" fill="#ef9a9a" font-size="10">Temperature: 1°C per 15 min  |  Salinity: 2 ppt per hour  |  pH: 0.5 per hour</text>

  <!-- Tips -->
  <rect x="50" y="235" width="240" height="70" rx="6" fill="#111822" stroke="#66bb6a" stroke-width="1"/>
  <text x="170" y="253" text-anchor="middle" fill="#66bb6a" font-size="9" font-weight="bold">DO</text>
  <text x="60" y="270" fill="#a5d6a7" font-size="8">Test bag water vs tank water first</text>
  <text x="60" y="283" fill="#a5d6a7" font-size="8">Take full 2 hours if big difference</text>
  <text x="60" y="296" fill="#a5d6a7" font-size="8">Watch for active swimming = healthy</text>

  <rect x="310" y="235" width="240" height="70" rx="6" fill="#111822" stroke="#ef5350" stroke-width="1"/>
  <text x="430" y="253" text-anchor="middle" fill="#ef5350" font-size="9" font-weight="bold">DON'T</text>
  <text x="320" y="270" fill="#ef9a9a" font-size="8">Dump PLs straight into tank</text>
  <text x="320" y="283" fill="#ef9a9a" font-size="8">Rush because they "look fine"</text>
  <text x="320" y="296" fill="#ef9a9a" font-size="8">Feed within 12 hours of stocking</text>
</svg>
