 white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="nodeLabel"><p>1️⃣ PRE-MOLT<br/><br/>Stops feeding<br/>Less active<br/>New shell forming<br/>underneath</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-B-1" transform="translate(433.21875, 95)"><rect class="basic label-container" style="fill:#ffcdd2 !important;stroke:#c62828 !important;stroke-width:3px !important" x="-98.1484375" y="-87" width="196.296875" height="174"></rect><g class="label" style="" transform="translate(-68.1484375, -72)"><rect></rect><foreignObject width="136.296875" height="144"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="nodeLabel"><p>2️⃣ ECDYSIS<br/><br/>⚠️ Old shell sheds<br/>Takes seconds<br/>MOST VULNERABLE<br/>TIME</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-C-3" transform="translate(781.015625, 195)"><rect class="basic label-container" style="fill:#e3f2fd !important;stroke:#1565c0 !important;stroke-width:2px !important" x="-97.265625" y="-87" width="194.53125" height="174"></rect><g class="label" style="" transform="translate(-67.265625, -72)"><rect></rect><foreignObject width="134.53125" height="144"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="nodeLabel"><p>3️⃣ POST-MOLT<br/><br/>Shell soft 1-4 hrs<br/>Absorbs water<br/>Expands ~15%<br/>🔴 Cannibalism risk</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-D-5" transform="translate(1114.984375, 395)"><rect class="basic label-container" style="fill:#e8f5e9 !important;stroke:#2e7d32 !important;stroke-width:2px !important" x="-88.59375" y="-87" width="177.1875" height="174"></rect><g class="label" style="" transform="translate(-58.59375, -72)"><rect></rect><foreignObject width="117.1