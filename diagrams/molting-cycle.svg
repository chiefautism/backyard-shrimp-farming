te-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>1️⃣ PRE-MOLT\n\nStops feeding\nLess active\nNew shell forming\nunderneath</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-B-1" transform="translate(526.609375, 71)"><rect class="basic label-container" style="fill:#ffcdd2 !important;stroke:#c62828 !important;stroke-width:3px !important" x="-130" y="-63" width="260" height="126"></rect><g class="label" style="" transform="translate(-100, -48)"><rect></rect><foreignObject width="200" height="96"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>2️⃣ ECDYSIS\n\n⚠️ Old shell sheds\nTakes seconds\nMOST VULNERABLE\nTIME</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-C-3" transform="translate(931.71875, 159)"><rect class="basic label-container" style="fill:#e3f2fd !important;stroke:#1565c0 !important;stroke-width:2px !important" x="-130" y="-63" width="260" height="126"></rect><g class="label" style="" transform="translate(-100, -48)"><rect></rect><foreignObject width="200" height="96"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>3️⃣ POST-MOLT\n\nShell soft 1-4 hrs\nAbsorbs water\nExpands ~15%\n🔴 Cannibalism risk</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-D-5" transform="translate(1339.828125, 335)"><rect class="basic label-container" style="fill:#e8f5e9 !important;stroke:#2e7d32 !important;stroke-width:2px !important" x="-130" y="-63" width="260" height="126"></rect><g class="label" style="" transform="translate(-100, -48)"><rect></rect><foreignObject width="200" height="96"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>4️⃣ INTER-MOLT\n\n✅ Active feeding\nGrowing phase\nLongest stage\n(days to weeks)</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-M-8" transform="translate(526.609375, 247)"><rect class="basic label-container" style="fill:#f3e5f5 !important;stroke:#7b1fa2 !important;stroke-dasharray:5 5 !important" x="-130" y="-63" width="260" height="126"></rect><g class="label" style="" transform="translate(-100, -48)"><rect></rect><foreignObject width="200" height="96"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>💊 Minerals Needed\nCa &gt; 200 mg/L\nMg &gt; 50 mg/L\nAlkalinity &gt; 100 mg/L</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-F-10" transform="translate(931.71875, 335)"><rect class="basic label-container" style="fill:#e8eaf6 !important;stroke:#283593 !important;stroke-dasharray:5 5 !important" x="-130" y="-51" width="260" height="102"></rect><g class="label" style="" transform="translate(-100, -36)"><rect></rect><foreignObject width="200" height="72"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>📅 Frequency\nPL: every 2-3 days\nJuvenile: 5-7 days\nAdult: 14-21 days</p></span></div></foreignObject></g></g></g></g></g></svg>