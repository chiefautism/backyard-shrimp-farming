es swarm<br/>🕐 Hours</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-C-3" transform="translate(810.78125, 95)"><rect class="basic label-container" style="fill:#fff3e0 !important;stroke:#e65100 !important;stroke-width:2px !important" x="-88.171875" y="-87" width="176.34375" height="174"></rect><g class="label" style="" transform="translate(-58.171875, -72)"><rect></rect><foreignObject width="116.34375" height="144"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="nodeLabel"><p>3️⃣ BERRIED<br/><br/>Eggs under tail<br/>20-30 per clutch<br/>Fans constantly<br/>🕐 28-35 days</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-D-5" transform="translate(1186.8046875, 331)"><rect class="basic label-container" style="fill:#e8f5e9 !important;stroke:#2e7d32 !important;stroke-width:2px !important" x="-123.8828125" y="-87" width="247.765625" height="174"></rect><g class="label" style="" transform="translate(-93.8828125, -72)"><rect></rect><foreignObject width="187.765625" height="144"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-align: center;"><span class="nodeLabel"><p>4️⃣ HATCH<br/><br/>✅ Miniature adults!<br/>No larval stage<br/>Immediately independent<br/>📏 Size: 1-2mm</p></span></div></foreignObject></g></g><g class="node default" id="flowchart-POP-8" transform="translate(810.78125, 331)"><rect class="basic label-container" style="fill:#e8eaf6 !important;stroke:#283593 !important;stroke-dasharray:5 5 !important" x="-124.53125" y="-99" width="249.0625" height="198"></rect><g class="label" style="" transform="translate(-94.53125, -84)"><rect></rect><foreignObject width="189.0625" height="168"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table-cell; white-space: nowrap; line-height: 1.5; max-width: 200px; text-ali