<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4fc3f7"/>
    </marker>
  </defs>
  <rect width="600" height="400" rx="8" fill="#0a0e17"/>
  <text x="300" y="30" text-anchor="middle" fill="#4fc3f7" font-size="16" font-weight="bold">Biofloc System Overview</text>

  <!-- Tank -->
  <rect x="150" y="60" width="300" height="200" rx="12" fill="#1a2332" stroke="#2a5080" stroke-width="2"/>
  <text x="300" y="85" text-anchor="middle" fill="#7ab8e0" font-size="11">IBC Tote / Grow Tank</text>

  <!-- Water with floc particles -->
  <rect x="160" y="95" width="280" height="155" rx="6" fill="#2a3a28" opacity="0.6"/>
  <!-- Floc particles -->
  <circle cx="200" cy="140" r="4" fill="#8B7355" opacity="0.7"/>
  <circle cx="250" cy="170" r="3" fill="#8B7355" opacity="0.6"/>
  <circle cx="310" cy="130" r="5" fill="#8B7355" opacity="0.7"/>
  <circle cx="370" cy="160" r="3" fill="#8B7355" opacity="0.6"/>
  <circle cx="220" cy="200" r="4" fill="#8B7355" opacity="0.7"/>
  <circle cx="340" cy="210" r="3" fill="#8B7355" opacity="0.6"/>
  <circle cx="280" cy="190" r="4" fill="#8B7355" opacity="0.7"/>
  <circle cx="400" cy="200" r="3" fill="#8B7355" opacity="0.6"/>

  <!-- Shrimp icons (simple) -->
  <text x="230" y="230" fill="#ff8a80" font-size="14">~</text>
  <text x="290" y="220" fill="#ff8a80" font-size="14">~</text>
  <text x="350" y="235" fill="#ff8a80" font-size="14">~</text>
  <text x="190" y="218" fill="#ff8a80" font-size="12">~</text>
  <text x="380" y="225" fill="#ff8a80" font-size="12">~</text>

  <!-- Air stones -->
  <ellipse cx="210" cy="245" rx="15" ry="4" fill="#5c6bc0" opacity="0.7"/>
  <ellipse cx="300" cy="245" rx="15" ry="4" fill="#5c6bc0" opacity="0.7"/>
  <ellipse cx="390" cy="245" rx="15" ry="4" fill="#5c6bc0" opacity="0.7"/>

  <!-- Bubbles -->
  <circle cx="210" cy="230" r="2" fill="#81d4fa" opacity="0.5"/>
  <circle cx="215" cy="215" r="1.5" fill="#81d4fa" opacity="0.4"/>
  <circle cx="207" cy="200" r="2" fill="#81d4fa" opacity="0.3"/>
  <circle cx="300" cy="228" r="2" fill="#81d4fa" opacity="0.5"/>
  <circle cx="295" cy="210" r="1.5" fill="#81d4fa" opacity="0.4"/>
  <circle cx="390" cy="232" r="2" fill="#81d4fa" opacity="0.5"/>
  <circle cx="385" cy="218" r="1.5" fill="#81d4fa" opacity="0.4"/>

  <!-- Air pump -->
  <rect x="20" y="200" width="80" height="40" rx="6" fill="#263238" stroke="#546e7a" stroke-width="1.5"/>
  <text x="60" y="224" text-anchor="middle" fill="#b0bec5" font-size="9">Air Pump</text>
  <line x1="100" y1="220" x2="150" y2="245" stroke="#546e7a" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Heater -->
  <rect x="500" y="130" width="60" height="30" rx="4" fill="#263238" stroke="#e57373" stroke-width="1.5"/>
  <text x="530" y="149" text-anchor="middle" fill="#ef9a9a" font-size="8">Heater</text>
  <line x1="500" y1="145" x2="450" y2="160" stroke="#e57373" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Labels around tank -->
  <!-- Feed input -->
  <rect x="460" y="55" width="110" height="35" rx="4" fill="#1b2631" stroke="#66bb6a" stroke-width="1"/>
  <text x="515" y="70" text-anchor="middle" fill="#a5d6a7" font-size="9">Feed Input</text>
  <text x="515" y="82" text-anchor="middle" fill="#66bb6a" font-size="8">+ Carbon Source</text>
  <line x1="460" y1="72" x2="450" y2="110" stroke="#66bb6a" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="3,2"/>

  <!-- Cycle diagram at bottom -->
  <rect x="40" y="285" width="520" height="100" rx="8" fill="#111822" stroke="#1e3050" stroke-width="1"/>
  <text x="300" y="305" text-anchor="middle" fill="#4fc3f7" font-size="11" font-weight="bold">The Biofloc Cycle</text>

  <!-- Cycle boxes -->
  <rect x="55" y="315" width="85" height="30" rx="4" fill="#1a2332" stroke="#ef5350" stroke-width="1"/>
  <text x="97" y="334" text-anchor="middle" fill="#ef9a9a" font-size="8">Shrimp Waste</text>
  <text x="97" y="343" text-anchor="middle" fill="#ef9a9a" font-size="7">(Ammonia)</text>

  <line x1="140" y1="330" x2="160" y2="330" stroke="#4fc3f7" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="160" y="315" width="90" height="30" rx="4" fill="#1a2332" stroke="#ffa726" stroke-width="1"/>
  <text x="205" y="334" text-anchor="middle" fill="#ffcc80" font-size="8">+ Carbon Source</text>
  <text x="205" y="343" text-anchor="middle" fill="#ffcc80" font-size="7">(Molasses)</text>

  <line x1="250" y1="330" x2="270" y2="330" stroke="#4fc3f7" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="270" y="315" width="90" height="30" rx="4" fill="#1a2332" stroke="#66bb6a" stroke-width="1"/>
  <text x="315" y="334" text-anchor="middle" fill="#a5d6a7" font-size="8">Bacteria Grow</text>
  <text x="315" y="343" text-anchor="middle" fill="#a5d6a7" font-size="7">(C:N = 15-20:1)</text>

  <line x1="360" y1="330" x2="380" y2="330" stroke="#4fc3f7" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="380" y="315" width="85" height="30" rx="4" fill="#1a2332" stroke="#4fc3f7" stroke-width="1"/>
  <text x="422" y="334" text-anchor="middle" fill="#81d4fa" font-size="8">Floc Forms</text>
  <text x="422" y="343" text-anchor="middle" fill="#81d4fa" font-size="7">(Free Protein!)</text>

  <line x1="465" y1="330" x2="485" y2="330" stroke="#4fc3f7" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="485" y="315" width="65" height="30" rx="4" fill="#1a2332" stroke="#ff8a80" stroke-width="1"/>
  <text x="517" y="334" text-anchor="middle" fill="#ff8a80" font-size="8">Shrimp</text>
  <text x="517" y="343" text-anchor="middle" fill="#ff8a80" font-size="7">Eat Floc</text>

  <!-- Return arrow -->
  <path d="M517,345 L517,365 L97,365 L97,345" fill="none" stroke="#4fc3f7" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="3,2"/>
  <text x="300" y="377" text-anchor="middle" fill="#4fc3f7" font-size="7">Cycle Repeats</text>
</svg>
